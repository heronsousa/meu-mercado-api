name: API CI

on:
  workflow_dispatch:
  push:
    branches:
      - chore/ci-cd

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      
      - name: Install dependencies
        run: npm ci

      - name: Set SST credentials
        run: |
          npx sst secret set DATABASE_URL "sua_url" --stage production
          npx sst secret set INFOSIMPLES_API_KEY "sua_key" --stage production
          npx sst secret set BETTER_AUTH_SECRET "seu_secret" --stage production

      - name: Deploy to AWS
        run: npm run deploy --stage production
      
      - name: Clean up
        run: rm -rf ~/.aws

